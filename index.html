<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/68edce83-37a2-4627-85ee-b1f9c48bb980.png" />
    <link rel="shortcut icon" type="image/png" href="/68edce83-37a2-4627-85ee-b1f9c48bb980.png" />
    <link rel="apple-touch-icon" href="/68edce83-37a2-4627-85ee-b1f9c48bb980.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Distribuidor Autorizado Ricoh en Perú. Venta y alquiler de fotocopiadoras, multifuncionales, impresoras, tóner, tintas y repuestos. Envío a todo el país y soporte técnico."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_PE" />
    <meta property="og:site_name" content="HaiStore" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#E30613" />
    <link
      rel="preload"
      as="image"
      href="/hero/home-hero-scene.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <link rel="preload" href="/catalog/home-bundle.json" as="fetch" type="application/json" crossorigin />
    <link rel="preload" href="/catalog/store-categories-tree.json" as="fetch" type="application/json" crossorigin />
    <title>HaiStore - Fotocopiadoras e Impresoras Ricoh | Distribuidor Autorizado</title>
  </head>
  <body>
    <div id="root">
      <div
        id="haistore-boot"
        style="min-height:100dvh;display:flex;align-items:center;justify-content:center;font-family:Montserrat,system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;padding:1.5rem;text-align:center"
      >
        <p style="margin:0;font-size:0.95rem;opacity:0.75">Cargando HaiStore…</p>
      </div>
    </div>
    <script>
      window.addEventListener('error', function (event) {
        var root = document.getElementById('root');
        if (!root || root.querySelector('[data-haistore-mounted]')) return;
        var msg = (event && event.message) || 'Error al cargar la aplicación';
        root.innerHTML =
          '<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;font-family:Montserrat,system-ui,sans-serif;background:#fff;color:#0f172a;padding:1.5rem;text-align:center">' +
          '<h1 style="margin:0;font-size:1.25rem">No se pudo cargar HaiStore</h1>' +
          '<p style="margin:0;max-width:28rem;font-size:0.875rem;color:#475569"></p>' +
          '<button type="button" onclick="location.reload()" style="min-height:2.75rem;padding:0 1rem;border:0;border-radius:0.375rem;background:#0f172a;color:#fff;font-size:0.875rem;cursor:pointer">Recargar</button>' +
          '</div>';
        var p = root.querySelector('p');
        if (p) p.textContent = msg;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
